<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MANGUITO - IA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 800px;
  background: white;
  border-radius: 25px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.3);
  overflow: hidden;
}
.header {
  background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
  color: white;
  padding: 25px;
  text-align: center;
}
.header h1 { font-size: 32px; }
.chat {
  height: 450px;
  overflow-y: auto;
  padding: 25px;
  background: #fff5f7;
}
.msg {
  margin-bottom: 18px;
  padding: 14px 18px;
  border-radius: 15px;
  max-width: 85%;
  line-height: 1.6;
}
.user {
  background: #f5576c;
  color: white;
  margin-left: auto;
}
.bot {
  background: white;
  border: 2px solid #f093fb;
}
.bot::before { content: "🥭 MANGUITO: "; font-weight: bold; color: #f5576c; }
.input-area {
  display: flex;
  padding: 18px;
  gap: 12px;
}
.input-area input {
  flex: 1;
  padding: 14px;
  border: 2px solid #f093fb;
  border-radius: 12px;
  font-size: 16px;
}
.input-area button {
  padding: 14px 28px;
  background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}
.loading { opacity: 0.6; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🥭 MANGUITO - IA</h1>
    <p>IA real - Respondo TODO con respuestas ciertas</p>
  </div>
  <div class="chat" id="chat">
    <div class="msg bot">Hola! Soy MANGUITO-IA con IA real. Pregúntame mates, código, tarea, lo que sea. Respondo con datos reales 🔥</div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Pregúntame cualquier cosa..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Enviar</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = text.replace(/\n/g, '<br>');
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if(!text) return;

  addMsg(text, 'user');
  input.value = '';

  const loadingMsg = addMsg("Pensando... 🥭", 'bot loading');

  try {
    const response = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text })
    });

    const data = await response.json();
    loadingMsg.remove();
    addMsg(data.text, 'bot');

  } catch(e) {
    loadingMsg.remove();
    addMsg("Error pata. Configura la API Key en Vercel", 'bot');
  }
}
</script>
</body>
</html>
