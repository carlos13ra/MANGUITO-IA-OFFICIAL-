<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGUITO - IA</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
 .chat-box {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
 .header {
    background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
    color: white;
    padding: 20px;
    text-align: center;
  }
 .header h1 { font-size: 24px; margin-bottom: 5px; }
 .header p { font-size: 12px; opacity: 0.9; }
 .chat-area {
    height: 400px;
    overflow-y: auto;
    padding: 20px;
    background: #f8f9fa;
  }
 .msg {
    margin-bottom: 15px;
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 85%;
    word-wrap: break-word;
  }
 .msg.bot {
    background: white;
    border: 1px solid #e0e0e0;
    align-self: flex-start;
  }
 .msg.user {
    background: #667eea;
    color: white;
    margin-left: auto;
  }
 .input-area {
    display: flex;
    padding: 15px;
    gap: 10px;
    background: white;
    border-top: 1px solid #e0e0e0;
  }
  input {
    flex: 1;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
  }
  input:focus { border-color: #667eea; }
  button {
    padding: 12px 20px;
    background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
 .loading { color: #667eea; font-style: italic; }
</style>
</head>
<body>
<div class="chat-box">
  <div class="header">
    <h1>🥭 MANGUITO - IA</h1>
    <p>IA real - Respondo TODO con datos ciertos</p>
  </div>

  <div class="chat-area" id="chat">
    <div class="msg bot">🥭 MANGUITO: Hola! Soy MANGUITO-IA con IA real. Pregúntame mates, código, tarea, lo que sea. Respondo con datos reales 🔥</div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Pregúntame cualquier cosa..." />
    <button id="btn" onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('btn');

input.addEventListener('keypress', e => {
  if (e.key === 'Enter') enviar();
});

async function enviar() {
  const texto = input.value.trim();
  if (!texto) return;

  // Mostrar mensaje usuario
  addMsg(texto, 'user');
  input.value = '';
  btn.disabled = true;

  // Mostrar loading
  const loadingId = addMsg('🥭 MANGUITO: Pensando...', 'bot loading');

  try {
    const res = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: texto })
    });

    const data = await res.json();

    // Quitar loading
    document.getElementById(loadingId).remove();

    // Mostrar respuesta
    addMsg('🥭 MANGUITO: ' + data.text, 'bot');

  } catch (e) {
    document.getElementById(loadingId).remove();
    addMsg('🥭 MANGUITO: ❌ Error de red: ' + e.message, 'bot');
  }

  btn.disabled = false;
}

function addMsg(texto, clase) {
  const id = 'msg-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg ' + clase;
  div.innerText = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return id;
}
</script>
</body>
</html>
